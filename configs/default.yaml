project:
  name: "ABIP"
  phase: 1

input:
  video_path: null
  frame_width: null
  frame_height: null

detection:
  model_name: "yolov8n"
  confidence_threshold: 0.35
  target_classes:
    - person
    - car
    - bicycle

tracking:
  enabled: true
  tracker_name: "bytetrack"

risk:
  enabled: true
  low_threshold: 0.30
  medium_threshold: 0.60
  high_threshold: 0.80

output:
  save_annotated_video: true
  output_dir: "outputs/videos"
  log_dir: "outputs/logs"